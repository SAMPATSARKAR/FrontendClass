<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .productlist{
            height : auto;
            width: 100%;
            margin: 15px;
            color: blueviolet;
            background-color: aquamarine;
            border: 10px solid blue;
            box-sizing: border-box;
            align-items: center;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
        }

        .product{
            height: 150px;
            width: 150px;
            margin: 15px;
            padding: 10px;
            color: blueviolet;
            background-color: orange;
            border: 10px solid blue;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="productlist">
        <div class="product">
            <button class="cartbtn">Add to Cart 1</button>
        </div>
        <div class="product">
            <button class="cartbtn">Add to Cart 2</button>
        </div>
    </div>
    <script src="EventDelegation.js"></script>
</body>
</html>
