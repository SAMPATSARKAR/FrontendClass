<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #todoInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #todoInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        #addBtn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            background: #e9ecef;
        }

        .filter-btn.active:hover {
            background: #5568d3;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border-left: 4px solid #28a745;
        }

        .todo-item.completed {
            background: #e9ecef;
            border-left-color: #6c757d;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #6c757d;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            margin-left: 10px;
        }

        .todo-actions {
            display: flex;
            gap: 5px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-complete {
            background: #28a745;
            color: white;
        }

        .btn-complete:hover {
            background: #218838;
        }

        .btn-edit {
            background: #ffc107;
            color: #212529;
        }

        .btn-edit:hover {
            background: #e0a800;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .edit-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 14px;
        }

        .stats {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-state small {
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .input-section {
                flex-direction: column;
            }

            .filters {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Todo List</h1>

        <div class="input-section">
            <input type="text" id="todoInput" placeholder="Add a new todo..." maxlength="100">
            <button id="addBtn">Add Todo</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>

        <div class="stats" id="stats"></div>
    </div>

    <script>
        class TodoApp {
            constructor() {
                this.todos = JSON.parse(localStorage.getItem('todos')) || [];
                this.currentFilter = 'all';
                this.todoId = parseInt(localStorage.getItem('todoId')) || 1;

                this.todoInput = document.getElementById('todoInput');
                this.addBtn = document.getElementById('addBtn');
                this.todoList = document.getElementById('todoList');
                this.filterBtns = document.querySelectorAll('.filter-btn');
                this.stats = document.getElementById('stats');

                this.initEventListeners();
                this.render();
            }

            initEventListeners() {
                this.addBtn.addEventListener('click', () => this.addTodo());
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.addTodo();
                    }
                });

                this.filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.setFilter(btn.dataset.filter);
                    });
                });
            }

            addTodo() {
                const text = this.todoInput.value.trim();
                if (!text) {
                    alert('Please enter a todo!');
                    return;
                }

                const todo = {
                    id: this.todoId++,
                    text: text,
                    completed: false,
                    createdAt: new Date()
                };

                this.todos.push(todo);
                this.todoInput.value = '';
                this.saveToStorage();
                this.render();
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveToStorage();
                    this.render();
                }
            }

            editTodo(id) {
                const li = document.querySelector(`[data-id="${id}"]`);
                const textSpan = li.querySelector('.todo-text');
                const actions = li.querySelector('.todo-actions');

                const currentText = textSpan.textContent;
                textSpan.innerHTML = `<input type="text" class="edit-input" value="${currentText}" maxlength="100">`;

                const input = textSpan.querySelector('.edit-input');
                input.focus();
                input.select();

                actions.innerHTML = `
                    <button class="btn btn-edit" onclick="todoApp.saveEdit(${id})">Save</button>
                    <button class="btn btn-delete" onclick="todoApp.cancelEdit(${id}, '${currentText.replace(/'/g, "\\'")}')">Cancel</button>
                `;
            }

            saveEdit(id) {
                const li = document.querySelector(`[data-id="${id}"]`);
                const input = li.querySelector('.edit-input');
                const newText = input.value.trim();

                if (!newText) {
                    alert('Todo cannot be empty!');
                    input.focus();
                    return;
                }

                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.text = newText;
                    this.saveToStorage();
                    this.render();
                }
            }

            cancelEdit(id, originalText) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.text = originalText;
                    this.render();
                }
            }

            deleteTodo(id) {
                if (confirm('Are you sure you want to delete this todo?')) {
                    this.todos = this.todos.filter(t => t.id !== id);
                    this.saveToStorage();
                    this.render();
                }
            }

            setFilter(filter) {
                this.currentFilter = filter;
                this.filterBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filter);
                });
                this.render();
            }

            getFilteredTodos() {
                switch (this.currentFilter) {
                    case 'active':
                        return this.todos.filter(t => !t.completed);
                    case 'completed':
                        return this.todos.filter(t => t.completed);
                    default:
                        return this.todos;
                }
            }

            updateStats() {
                const total = this.todos.length;
                const completed = this.todos.filter(t => t.completed).length;
                const active = total - completed;

                this.stats.textContent = `Total: ${total} | Active: ${active} | Completed: ${completed}`;
            }

            render() {
                const filteredTodos = this.getFilteredTodos();

                if (filteredTodos.length === 0) {
                    if (this.todos.length === 0) {
                        this.todoList.innerHTML = `
                            <div class="empty-state">
                                <p>No todos yet!</p>
                                <small>Add your first todo above</small>
                            </div>
                        `;
                    } else {
                        this.todoList.innerHTML = `
                            <div class="empty-state">
                                <p>No ${this.currentFilter} todos</p>
                                <small>Try a different filter</small>
                            </div>
                        `;
                    }
                } else {
                    this.todoList.innerHTML = filteredTodos.map(todo => `
                        <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="todoApp.toggleTodo(${todo.id})">
                            <span class="todo-text">${this.escapeHtml(todo.text)}</span>
                            <div class="todo-actions">
                                <button class="btn btn-edit" onclick="todoApp.editTodo(${todo.id})">✏️</button>
                                <button class="btn btn-delete" onclick="todoApp.deleteTodo(${todo.id})">🗑️</button>
                            </div>
                        </li>
                    `).join('');
                }

                this.updateStats();
                this.saveToStorage();
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            saveToStorage() {
                localStorage.setItem('todos', JSON.stringify(this.todos));
                localStorage.setItem('todoId', this.todoId);
            }
        }

        // Initialize the app
        const todoApp = new TodoApp();
    </script>
</body>
</html>
